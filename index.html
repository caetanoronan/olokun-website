<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard â€” Escolas - Grande FlorianÃ³polis</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Layout simples inspirado no dashboard de referÃªncia */
    html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, Arial, sans-serif;background:#f8fafc}
    .container{display:flex;height:100vh;gap:12px;padding:12px}
    .sidebar{width:360px;background:#ffffff;border-radius:8px;padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.08);overflow:auto}
    .map-wrap{flex:1;position:relative}
    #map{position:absolute;inset:0;border-radius:8px}
    h2{margin:6px 0 12px 0;font-size:16px}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .btn{background:#1f2937;color:#fff;padding:6px 10px;border-radius:6px;text-decoration:none;cursor:pointer;font-size:13px}
    .muted{color:#6b7280;font-size:13px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:6px 8px;border-bottom:1px solid #eef2f7;text-align:left}
    tr:hover{background:#f1f5f9}
    .small{font-size:12px;color:#475569}
    .legend{margin-top:8px;font-size:13px}
    .checkbox{display:inline-flex;align-items:center;gap:6px}
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Dashboard â€” Escolas (Grande FlorianÃ³polis)</h2>
      <div class="muted">Autor: Ronan Armando Caetano</div>
      <div style="height:10px"></div>
      <div class="controls">
        <button id="zoomHome" class="btn">Centro</button>
        <button id="fitAll" class="btn">Ajustar ao conjunto</button>
        <label class="checkbox"><input type="checkbox" id="toggleHeat"> <span class="small">Heatmap</span></label>
        <label class="checkbox"><input type="checkbox" id="showPublic" checked> <span class="small">Escolas PÃºblicas</span></label>
        <label class="checkbox"><input type="checkbox" id="showPrivate" checked> <span class="small">Escolas Privadas</span></label>
      </div>

      <div class="legend">
        <div><strong>Fonte:</strong> INEP, IBGE, OpenStreetMap</div>
        <div style="height:8px"></div>
        <div><strong>Legenda:</strong></div>
        <div style="display:flex;gap:8px;margin-top:6px;align-items:center"><div style="width:14px;height:14px;background:#22c55e;border-radius:50%"></div><div class="small">PÃºblicas</div></div>
        <div style="display:flex;gap:8px;margin-top:6px;align-items:center"><div style="width:14px;height:14px;background:#f97316;border-radius:50%"></div><div class="small">Privadas</div></div>
      </div>

      <div style="height:12px"></div>
      <div><strong>Lista de Escolas</strong> (<span id="totalCount">0</span>)</div>
      <div style="height:8px"></div>
      <input id="search" placeholder="Pesquisar por nome ou municÃ­pio" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e6eefc;margin-bottom:8px">

      <div style="max-height:56vh;overflow:auto">
        <table id="schoolsTable">
          <thead><tr><th>Nome</th><th class="small">Tipo</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

    </div>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script>
    // Inicializar mapa
    var map = L.map('map', { center: [-27.5954, -48.548], zoom: 11, minZoom:8, maxZoom:18 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);

    var publicLayer, privateLayer, heatLayer;
    var allPoints = [];
    var markersMap = []; // store marker refs for table linking

    function makeMarker(feature, latlng, color){
      var m = L.circleMarker(latlng, { radius:7, fillColor:color, color:color, weight:1, fillOpacity:0.9, interactive:true });
      var p = feature.properties || {};
      var popup = '<div style="font-family:Arial, sans-serif; font-size:13px; padding:6px">'
        + '<strong>' + (p.Escola || 'Escola') + '</strong><br>'
        + '<span class="small">' + (p['Categoria Administrativa']||'') + ' â€” ' + (p['DependÃªncia Administrativa']||'') + '</span><br>'
        + '<span class="small">' + (p.MunicÃ­pio||'') + '</span>'
        + '</div>';
      m.bindPopup(popup);
      return m;
    }

    // load public
    fetch('data/escolas_publicas.geojson').then(function(r){return r.json()}).then(function(data){
      publicLayer = L.geoJSON(data, {
        pointToLayer: function(f,latlng){
          var mk = makeMarker(f,latlng,'#22c55e');
          markersMap.push({marker:mk,props:f.properties});
          allPoints.push([latlng.lat, latlng.lng, 0.6]);
          return mk;
        }
      });
      // ensure events active: add to map after binding
      publicLayer.addTo(map);
      populateTable();
    }).catch(function(e){console.error('public load',e)});

    // load private
    fetch('data/escolas_privadas.geojson').then(function(r){return r.json()}).then(function(data){
      privateLayer = L.geoJSON(data, {
        pointToLayer: function(f,latlng){
          var mk = makeMarker(f,latlng,'#f97316');
          markersMap.push({marker:mk,props:f.properties});
          allPoints.push([latlng.lat, latlng.lng, 0.6]);
          return mk;
        }
      });
      privateLayer.addTo(map);
      populateTable();
    }).catch(function(e){console.error('private load',e)});

    // heatmap (initially off)
    function createHeat(){
      if(heatLayer) return;
      heatLayer = L.heatLayer(allPoints, {radius:25, blur:20, maxZoom: 16});
    }

    // table population and interactions
    function populateTable(){
      var tbody = document.querySelector('#schoolsTable tbody');
      tbody.innerHTML = '';
      markersMap.forEach(function(item,i){
        var tr = document.createElement('tr');
        var tdName = document.createElement('td');
        tdName.textContent = item.props.Escola || 'â€”';
        var tdType = document.createElement('td'); tdType.className='small';
        tdType.textContent = (item.props['DependÃªncia Administrativa']||item.props['Categoria Administrativa']||'');
        tr.appendChild(tdName); tr.appendChild(tdType);
        tr.style.cursor='pointer';
        tr.addEventListener('click', function(){
          var m = item.marker;
          map.setView(m.getLatLng(), 16);
          m.openPopup();
        });
        tbody.appendChild(tr);
      });
      document.getElementById('totalCount').textContent = markersMap.length;
    }

    // Search
    document.getElementById('search').addEventListener('input', function(e){
      var q = e.target.value.toLowerCase();
      var rows = document.querySelectorAll('#schoolsTable tbody tr');
      rows.forEach(function(r,idx){
        var name = r.cells[0].textContent.toLowerCase();
        var muni = markersMap[idx].props.MunicÃ­pio ? markersMap[idx].props.MunicÃ­pio.toLowerCase() : '';
        if(name.indexOf(q) !== -1 || muni.indexOf(q) !== -1){ r.style.display='table-row'; } else { r.style.display='none'; }
      });
    });

    // controls
    document.getElementById('zoomHome').addEventListener('click', function(){ map.setView([-27.5954, -48.548], 11); });
    document.getElementById('fitAll').addEventListener('click', function(){
      var g = L.featureGroup(markersMap.map(function(x){return x.marker;}));
      if(g.getLayers().length) map.fitBounds(g.getBounds(), {padding:[20,20]});
    });

    document.getElementById('toggleHeat').addEventListener('change', function(e){
      if(e.target.checked){ createHeat(); map.addLayer(heatLayer); } else { if(heatLayer) map.removeLayer(heatLayer); }
    });

    document.getElementById('showPublic').addEventListener('change', function(e){ if(publicLayer){ if(e.target.checked) map.addLayer(publicLayer); else map.removeLayer(publicLayer);} });
    document.getElementById('showPrivate').addEventListener('change', function(e){ if(privateLayer){ if(e.target.checked) map.addLayer(privateLayer); else map.removeLayer(privateLayer);} });

    // small safety: if layers are loaded asynchronously, update table when all loaded
    setTimeout(function(){ populateTable(); }, 800);
  </script>
</body>
</html>
