<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformação - Ronan Caetano (Videoclipe)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #001a33 0%, #003366 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            height: 100vh;
            background: #000;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        button {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #info {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 50;
        }
        
        #info h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #00b4d8;
        }
        
        #info p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        #lyrics {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            max-width: 90%;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 50;
            line-height: 1.5;
        }
        
        #lyrics.show {
            opacity: 1;
        }
        
        .credit {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-align: right;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        
        <div id="info">
            <h1>🌊 Transformação</h1>
            <p>Ronan Caetano</p>
        </div>
        
        <div id="lyrics"></div>
        
        <div class="credit">
            Videoclipe Animado<br>
            Conceito: Conservação Ambiental
        </div>
        
        <div id="controls">
            <button id="playBtn">▶️ Play</button>
            <button id="restartBtn">🔄 Reiniciar</button>
            <button id="fullscreenBtn">⛶ Fullscreen</button>
        </div>
        
        <audio id="audio" src="Transformação_.mp3" preload="auto"></audio>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const restartBtn = document.getElementById('restartBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const lyricsDiv = document.getElementById('lyrics');
        
        let animationId;
        let time = 0;
        let isPlaying = false;
        
        // Ajusta o canvas para preencher a tela
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Letra sincronizada com timestamps (em segundos)
        const lyrics = [
            { time: 5, text: "Olha que lindo o mar" },
            { time: 9, text: "As tartarugas e as baleias" },
            { time: 13, text: "nudibrânquio e algas marinhas" },
            { time: 17, text: "Veja o mangue que bonito" },
            { time: 21, text: "É a vida e o berçário" },
            { time: 25, text: "A baía que deságua" },
            { time: 29, text: "No marzão que nos rodeia" },
            { time: 35, text: "Vamos conservar a natureza" },
            { time: 39, text: "E reciclar nossos resíduos" },
            { time: 43, text: "Vamos contemplar a natureza" },
            { time: 47, text: "E reciclar nossos hábitos" },
            { time: 55, text: "Então não jogue a bituca no chão" },
            { time: 59, text: "Evite sacolinhas plásticas" },
            { time: 63, text: "Que tem somente uma vida" },
            { time: 67, text: "Leve a bag ao mercadinho" },
            { time: 71, text: "Ao armazém ou sacolão" },
            { time: 75, text: "E contemple a natureza" },
            { time: 79, text: "Sem plástico ou lixo" },
            { time: 85, text: "♻️ Vamos conservar a natureza ♻️" },
            { time: 89, text: "E reciclar nossos resíduos" },
            { time: 93, text: "🌿 Vamos contemplar a natureza 🌿" },
            { time: 97, text: "E reciclar os nossos hábitos" },
            { time: 101, text: "Hábitos hábitos hábitos" }
        ];
        
        let currentLyricIndex = 0;
        
        // Partículas (bolhas, algas flutuantes)
        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'bubble', 'seaweed', 'plastic', 'fish'
                this.size = Math.random() * 20 + 10;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.angle = Math.random() * Math.PI * 2;
                this.color = this.getColor();
            }
            
            getColor() {
                switch(this.type) {
                    case 'bubble': return 'rgba(173, 216, 230, 0.6)';
                    case 'seaweed': return 'rgba(34, 139, 34, 0.7)';
                    case 'plastic': return 'rgba(255, 100, 100, 0.8)';
                    case 'fish': return 'rgba(255, 165, 0, 0.8)';
                    default: return 'rgba(255, 255, 255, 0.5)';
                }
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += 0.02;
                
                // Movimento ondulatório
                this.x += Math.sin(this.angle) * 0.5;
                
                // Volta para a tela se sair
                if (this.x < -50) this.x = canvas.width + 50;
                if (this.x > canvas.width + 50) this.x = -50;
                if (this.y < -50) this.y = canvas.height + 50;
                if (this.y > canvas.height + 50) this.y = -50;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                
                if (this.type === 'bubble') {
                    // Bolha
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (this.type === 'seaweed') {
                    // Alga
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const offsetX = Math.sin(this.angle + i) * 5;
                        ctx.lineTo(this.x + offsetX, this.y + i * 8);
                    }
                    ctx.stroke();
                } else if (this.type === 'plastic') {
                    // Plástico (sacola)
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size * 1.5);
                } else if (this.type === 'fish') {
                    // Peixe simples
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, this.size, this.size/2, this.angle, 0, Math.PI * 2);
                    ctx.fill();
                    // Cauda
                    ctx.beginPath();
                    ctx.moveTo(this.x - this.size, this.y);
                    ctx.lineTo(this.x - this.size * 1.5, this.y - this.size/2);
                    ctx.lineTo(this.x - this.size * 1.5, this.y + this.size/2);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        // Tartaruga
        class Turtle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 60;
                this.speed = 1;
                this.angle = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                if (this.x < -100) this.x = canvas.width + 100;
                if (this.x > canvas.width + 100) this.x = -100;
                if (this.y < -100) this.y = canvas.height + 100;
                if (this.y > canvas.height + 100) this.y = -100;
                
                // Muda direção ocasionalmente
                if (Math.random() < 0.01) {
                    this.angle += (Math.random() - 0.5) * 0.5;
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Casco
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Padrão do casco
                ctx.strokeStyle = '#006400';
                ctx.lineWidth = 2;
                for (let i = 0; i < 6; i++) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * (0.3 + i * 0.1), 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                // Cabeça
                ctx.fillStyle = '#90EE90';
                ctx.beginPath();
                ctx.arc(this.size * 0.8, 0, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // Nadadeiras
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.ellipse(-this.size * 0.5, -this.size * 0.5, this.size * 0.4, this.size * 0.2, -0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(-this.size * 0.5, this.size * 0.5, this.size * 0.4, this.size * 0.2, 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Baleia
        class Whale {
            constructor() {
                this.x = -200;
                this.y = canvas.height * 0.4;
                this.size = 120;
                this.speed = 0.8;
            }
            
            update() {
                this.x += this.speed;
                this.y += Math.sin(time * 0.001) * 0.5;
                
                if (this.x > canvas.width + 200) {
                    this.x = -200;
                }
            }
            
            draw() {
                ctx.save();
                ctx.fillStyle = '#4169E1';
                
                // Corpo
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size, this.size * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Cauda
                ctx.beginPath();
                ctx.moveTo(this.x - this.size, this.y);
                ctx.lineTo(this.x - this.size * 1.3, this.y - this.size * 0.4);
                ctx.lineTo(this.x - this.size * 1.3, this.y + this.size * 0.4);
                ctx.closePath();
                ctx.fill();
                
                // Olho
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x + this.size * 0.5, this.y - this.size * 0.2, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Jato de água
                if (Math.floor(time / 100) % 10 < 3) {
                    ctx.strokeStyle = 'rgba(135, 206, 250, 0.7)';
                    ctx.lineWidth = 4;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(this.x + this.size * 0.3, this.y - this.size * 0.5);
                        ctx.lineTo(this.x + this.size * 0.3 + i * 10, this.y - this.size * 0.8 - i * 20);
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            }
        }
        
        // Inicialização
        let particles = [];
        let turtles = [];
        let whale = new Whale();
        
        function init() {
            particles = [];
            
            // Cria partículas variadas
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    'bubble'
                ));
            }
            
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    'seaweed'
                ));
            }
            
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    'fish'
                ));
            }
            
            // Tartarugas
            turtles = [];
            for (let i = 0; i < 3; i++) {
                turtles.push(new Turtle());
            }
        }
        
        init();
        
        // Função de desenho de fundo oceânico
        function drawOcean() {
            // Gradiente do oceano
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#001a33');
            gradient.addColorStop(0.5, '#003d5c');
            gradient.addColorStop(1, '#005f73');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Raios de luz
            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = 'white';
            for (let i = 0; i < 5; i++) {
                const x = (canvas.width / 6) * i + Math.sin(time * 0.0005 + i) * 100;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x - 100, canvas.height);
                ctx.lineTo(x + 100, canvas.height);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }
        
        // Atualiza letra
        function updateLyrics() {
            if (!isPlaying) return;
            
            const currentTime = time / 1000; // Converte para segundos
            
            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i].time && (i === lyrics.length - 1 || currentTime < lyrics[i + 1].time)) {
                    if (currentLyricIndex !== i) {
                        currentLyricIndex = i;
                        lyricsDiv.textContent = lyrics[i].text;
                        lyricsDiv.classList.add('show');
                        
                        // Esconde após 3 segundos
                        setTimeout(() => {
                            lyricsDiv.classList.remove('show');
                        }, 3000);
                    }
                    break;
                }
            }
        }
        
        // Loop de animação
        function animate() {
            drawOcean();
            
            // Atualiza e desenha partículas
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // Desenha tartarugas
            turtles.forEach(t => {
                t.update();
                t.draw();
            });
            
            // Desenha baleia
            whale.update();
            whale.draw();
            
            // Atualiza letra
            updateLyrics();
            
            // Efeito de transformação - adiciona reciclagem visual em certos momentos
            if (time > 50000 && time < 85000) {
                // Adiciona plásticos que se transformam
                if (Math.random() < 0.02) {
                    particles.push(new Particle(
                        Math.random() * canvas.width,
                        -50,
                        'plastic'
                    ));
                }
            }
            
            time += 16; // ~60fps
            animationId = requestAnimationFrame(animate);
        }
        
        // Controles
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                cancelAnimationFrame(animationId);
                playBtn.textContent = '▶️ Play';
                isPlaying = false;
            } else {
                audio.play().catch(err => {
                    console.log('Nota: Para tocar a música, você precisa usar o arquivo de áudio local');
                });
                animate();
                playBtn.textContent = '⏸️ Pause';
                isPlaying = true;
            }
        });
        
        restartBtn.addEventListener('click', () => {
            time = 0;
            currentLyricIndex = 0;
            audio.currentTime = 0;
            lyricsDiv.classList.remove('show');
            init();
        });
        
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.getElementById('container').requestFullscreen();
            }
        });
        
        // Inicia a animação (sem som até clicar em play)
        animate();
    </script>
</body>
</html>
